name: CI/CD - React Project

on:
  push:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
        # אם אין לך עדיין טסטים והפקודה נכשלת, אפשר להוסיף || true זמנית

      - name: Build React Project
        run: npm run build
        # שלב זה מוודא שהקוד של React תקין וניתן לקמפל אותו

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # כאן אתה מגדיר את שם ה-Repo שלך בדוקר האב
          tags: mordocker876/react-app:latest